name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Prevent overlapping deploys if you push twice quickly
concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          # Public Turnstile site key (safe to expose; already in the client HTML)
          PUBLIC_TURNSTILE_SITEKEY: 0x4AAAAAADn5qRIuNaEgSftO

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Uploads dist/ plus the top-level functions/ folder (contact form) to the
          # existing direct-upload project. --branch=main = production deployment.
          command: pages deploy dist --project-name=learners-academy --branch=main --commit-dirty=true
